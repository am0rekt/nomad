<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Admin - Scam Reports</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen">

<div class="max-w-7xl mx-auto py-10 px-6">

    <!-- Header -->
    <div class="flex justify-between items-center mb-8">
        <h1 class="text-3xl font-bold text-gray-800">Scam Reports</h1>
        <a th:href="@{/admin}" 
           class="bg-gray-800 text-white px-4 py-2 rounded hover:bg-gray-700">
            Back to Dashboard
        </a>
    </div>

    <!-- Table -->
    <div class="bg-white shadow rounded-lg overflow-hidden">

        <table class="min-w-full divide-y divide-gray-200">
            <thead class="bg-gray-50">
            <tr>
                <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">ID</th>
                <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Title</th>
                <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Description</th>
                <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Reported By</th>
                <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Date</th>
                <th class="px-6 py-3 text-center text-xs font-medium text-gray-500 uppercase">Actions</th>
            </tr>
            </thead>

            <tbody class="bg-white divide-y divide-gray-200">

            <tr th:each="scam : ${scams}">
                <td class="px-6 py-4" th:text="${scam.scamID}"></td>

                <td class="px-6 py-4 font-semibold"
                    th:text="${scam.title}"></td>

                <td class="px-6 py-4"
                    th:text="${scam.description}"></td>

                <td class="px-6 py-4"
				    th:text="${scam.createdBy.userName}"></td>
                <td class="px-6 py-4"
                    th:text="${#temporals.format(scam.createdAt,'dd MMM yyyy HH:mm')}"></td>

                <td class="px-6 py-4 text-center">
                    <a th:href="@{/admin/scam/delete/{id}(id=${scam.scamID})}"
                       class="bg-red-500 text-white px-3 py-1 rounded hover:bg-red-600">
                        Delete
                    </a>
                </td>
            </tr>

            <!-- If no scams -->
            <tr th:if="${#lists.isEmpty(scams)}">
                <td colspan="6" class="text-center py-6 text-gray-500">
                    No scam reports found.
                </td>
            </tr>

            </tbody>
        </table>
    </div>
</div>

</body>
</html>
