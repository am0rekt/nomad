<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password - NomadNetwork</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: radial-gradient(circle, #1e3c4a 0%, #0f1a1f 100%);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
        }
        .reset-card {
            background: #f8f9fa;
            padding: 2.5rem;
            border-radius: 12px;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.4);
            text-align: center;
        }
        .brand-name {
            color: #2c4f5e;
            font-weight: 700;
            margin-bottom: 0.2rem;
        }
        .tagline {
            font-size: 0.85rem;
            color: #6c757d;
            margin-bottom: 2rem;
        }
        .form-label {
            font-size: 0.9rem;
            font-weight: 600;
            color: #495057;
        }
        .btn-nomad {
            background-color: #2c4f5e;
            color: white;
            border: none;
            padding: 0.6rem;
            transition: 0.3s;
        }
        .btn-nomad:hover {
            background-color: #1e3c4a;
            color: white;
            transform: translateY(-1px);
        }
        .alert {
            font-size: 0.85rem;
            border-radius: 8px;
        }
    </style>
</head>
<body>

<div class="reset-card">
    <h3 class="brand-name">🌍 NomadNetwork</h3>
    <p class="tagline">Secure your account</p>

    <div th:if="${error}" class="alert alert-danger mb-3" th:text="${error}"></div>
    <div th:if="${message}" class="alert alert-success mb-3" th:text="${message}"></div>

    <form th:action="@{/reset-password}" method="post">
        <input type="hidden" name="token" th:value="${token}" />

        <div class="mb-3 text-start">
            <label for="password" class="form-label">New Password</label>
            <input type="password" id="password" name="password" 
                   class="form-control" placeholder="••••••••" required>
        </div>

        <div class="mb-4 text-start">
            <label for="confirmPassword" class="form-label">Confirm New Password</label>
            <input type="password" id="confirmPassword" name="confirmPassword" 
                   class="form-control" placeholder="••••••••" required>
        </div>

        <button type="submit" class="btn btn-nomad w-100 mb-3">
            Update Password
        </button>

        <div class="small">
            <a th:href="@{/login}" class="text-decoration-none text-muted">Return to Login</a>
        </div>
    </form>
</div>

</body>
</html>
