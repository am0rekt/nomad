<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>NomadNetwork | Create Post</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
            min-height: 100vh;
            font-family: 'Segoe UI', sans-serif;
        }

        .navbar {
            background: transparent !important;
        }

        .navbar-brand {
            font-weight: 700;
            color: white !important;
            font-size: 22px;
        }

        .form-card {
            background: rgba(255, 255, 255, 0.95);
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.2);
        }

        .btn-nomad {
            background: #2c5364;
            color: white;
            border-radius: 10px;
            padding: 10px;
            font-weight: 600;
        }

        .btn-nomad:hover {
            background: #203a43;
            color: white;
        }

        .btn-outline-light {
            border-radius: 10px;
        }

        label {
            font-weight: 600;
            margin-bottom: 5px;
        }
    </style>
</head>

<body>

<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg px-4 py-3">
    <a class="navbar-brand" href="/">🌍 NomadNetwork</a>

    <div class="ms-auto d-flex gap-2 align-items-center">

        <a th:if="${currentUser != null}"
           th:href="@{/profile}"
           class="btn btn-outline-light btn-sm">
            Profile
        </a>

        <form th:if="${currentUser != null}"
              th:action="@{/logout}"
              method="post">
            <button class="btn btn-outline-light btn-sm">
                Logout
            </button>
        </form>

    </div>
</nav>

<!-- FORM -->
<div class="container mt-4 mb-5">
    <div class="row justify-content-center">
        <div class="col-lg-8">

            <div class="form-card">
                <h3 class="text-center mb-4" style="color:#2c5364; font-weight:700;">
                    Create a New Post
                </h3>

				<form th:action="@{/posts/create}"
				      th:object="${post}"
				      method="post"
				      enctype="multipart/form-data">

				    <!-- TITLE -->
				    <div class="mb-3">
				        <label>Title</label>
				        <input type="text"
				               th:field="*{title}"
				               class="form-control"
				               placeholder="Enter title"
				               required>
				        <div class="text-danger small"
				             th:if="${#fields.hasErrors('title')}"
				             th:errors="*{title}"></div>
				    </div>

				    <!-- DESCRIPTION -->
				    <div class="mb-3">
				        <label>Description</label>
				        <textarea th:field="*{description}"
				                  class="form-control"
				                  rows="3"
				                  placeholder="Write something..."></textarea>
				    </div>

				    <!-- CONTENT -->
				    <div class="mb-3">
				        <label>Content</label>
				        <textarea th:field="*{content}"
				                  class="form-control"
				                  rows="5"
				                  placeholder="Enter detailed content..."
				                  required></textarea>
				        <div class="text-danger small"
				             th:if="${#fields.hasErrors('content')}"
				             th:errors="*{content}"></div>
				    </div>

				    <!-- PLACE -->
				    <div class="mb-3">
				        <label>Place Name</label>
				        <input type="text"
				               th:field="*{placeName}"
				               class="form-control"
				               placeholder="Enter place name"
				               required>
				    </div>

				    <div class="mb-3">
				        <label>Country</label>
				        <input type="text"
				               th:field="*{country}"
				               class="form-control"
				               placeholder="Enter country"
				               required>
				    </div>

				    <!-- IMAGE -->
					<div class="mb-4">
					    <label>Upload Image</label>

					    <input type="file"
					           name="image"
					           class="form-control"
					           accept=".jpg,.jpeg,.png"
					           required
					           onchange="previewImage(event)">

					    <p id="fileName" class="small text-muted mt-2"></p>

					    <div class="mt-3 text-center">
					        <img id="imagePreview"
					             class="img-fluid rounded shadow-sm border"
					             style="max-height: 350px; display: none; object-fit: cover;">
					    </div>
					</div>

				    <!-- SCAM SECTION -->
				    <div class="p-3 mb-4 rounded"
				         style="background:#fff3f3; border:1px solid #ffc9c9;">

				        <h5 class="mb-3" style="color:#b02a37;">
				            ⚠ Report a Scam (Optional)
				        </h5>

				        <div class="mb-3">
				            <label>Scam Title</label>
				            <input type="text"
				                   th:field="*{scamTitle}"
				                   class="form-control"
				                   placeholder="Enter scam title">
				        </div>

				        <div class="mb-3">
				            <label>Scam Description</label>
				            <textarea th:field="*{scamDescription}"
				                      class="form-control"
				                      rows="3"
				                      placeholder="Describe the scam..."></textarea>
				        </div>

				        <div class="mb-3">
				            <label>Severity</label>
				            <select th:field="*{scamSeverity}"
				                    class="form-select">
				                <option value="">Select severity</option>
				                <option th:value="LOW">LOW</option>
				                <option th:value="MEDIUM">MEDIUM</option>
				                <option th:value="HIGH">HIGH</option>
				            </select>
				        </div>
				    </div>

				    <!-- SUBMIT -->
				    <div class="d-grid">
				        <button type="submit" class="btn btn-nomad">
				            Submit Post
				        </button>
				    </div>

				</form>
            </div>

        </div>
    </div>
</div>

<script>
function previewImage(event) {
    const input = event.target;
    const preview = document.getElementById("imagePreview");
    const fileName = document.getElementById("fileName");

    if (input.files && input.files[0]) {
        const reader = new FileReader();

        reader.onload = function(e) {
            preview.src = e.target.result;
            preview.style.display = "block";
        };

        fileName.innerText = "Selected file: " + input.files[0].name;
        reader.readAsDataURL(input.files[0]);
    } else {
        preview.style.display = "none";
        fileName.innerText = "";
    }
}
</script>

</body>
</html>
