<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head>
    <title>User Profile</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
</head>

<body class="bg-gray-100 min-h-screen flex flex-col">

<!-- ================= NAVBAR ================= -->
<header class="bg-gray-900 text-white shadow-md">
    <div class="max-w-6xl mx-auto px-6 py-3 flex justify-between items-center">

        <!-- Logo -->
        <a href="/" class="text-xl font-semibold">
            Nomad Network
        </a>

        <!-- Right Side -->
        <div class="flex items-center space-x-4">

            <!-- Create Post -->
            <a sec:authorize="isAuthenticated()"
               href="/create-post"
               class="bg-green-600 px-4 py-1 rounded text-sm hover:bg-green-700 transition">
                + Create Post
            </a>
			<!-- Home -->
			    <a href="/"
			       class="border border-gray-500 px-4 py-1 rounded text-sm hover:bg-gray-700 transition">
			        Home
			    </a>



				<!-- Delete Account & Forgot Password (ONLY PROFILE OWNER) -->
				<form sec:authorize="isAuthenticated() and principal.username == #vars.user.email"
				      th:action="@{/delete-account}"
				      method="post"
				      class="flex items-center gap-4">

				    <!-- Delete Button -->
				    <button type="submit"
				            onclick="return confirm('Are you sure you want to delete your account? This cannot be undone.')"
				            class="bg-red-600 px-3 py-1 rounded text-sm hover:bg-red-700 transition">
				        Delete
				    </button>

				    <!-- Forgot Password Button -->
				    <a th:href="@{/forgot-password}"
				       class="bg-blue-600 px-3 py-1 rounded text-sm text-white hover:bg-blue-700 transition">
				        Forgot Password
				    </a>
				</form>

            <!-- Logout -->
            <a sec:authorize="isAuthenticated()"
               href="/logout"
               class="border border-red-500 text-red-400 px-3 py-1 rounded text-sm hover:bg-red-500 hover:text-white transition">
                Logout
            </a>

        </div>
    </div>
</header>

<!-- ================= MAIN CONTENT ================= -->
<main class="flex-grow">

<div class="max-w-4xl mx-auto p-6">

    <!-- Profile Card -->
    <div class="bg-white rounded-lg shadow p-6 mb-6">
        <div class="flex items-center space-x-6">

            <!-- Avatar -->
            <div class="w-24 h-24 rounded-full bg-gray-400 flex items-center justify-center text-3xl font-bold text-white">
                <span th:text="${user.userName.substring(0,1).toUpperCase()}">U</span>
            </div>

            <!-- User Info -->
            <div>
                <h1 class="text-2xl font-bold mb-1"
                    th:text="${user.userName}">Username</h1>

                <p class="text-gray-600 mb-3"
                   th:text="${user.bio}">User bio</p>

                <div class="text-sm text-gray-500 mt-2">
                    <p>Email: <span th:text="${user.email}"></span></p>
                    <p>Phone: <span th:text="${user.phone}"></span></p>
                </div>
            </div>
        </div>
    </div>

    <!-- User Posts -->
    <div th:if="${posts != null and !posts.isEmpty()}">
        <h2 class="text-xl font-semibold mb-4">Posts</h2>

        <div class="grid grid-cols-2 md:grid-cols-3 gap-2">
            <a th:each="post : ${posts}"
               th:href="@{/posts/{id}(id=${post.postID})}"
               class="block">

                <div class="aspect-square overflow-hidden rounded">
                    <img th:src="${post.postUrl}"
                         class="w-full h-full object-cover hover:scale-105 transition duration-300">
                </div>

            </a>
        </div>
    </div>

    <div th:if="${posts == null or posts.isEmpty()}"
         class="text-gray-500 text-center mt-6">
        No posts yet.
    </div>

</div>

</main>

<!-- ================= FOOTER ================= -->
<footer class="bg-gray-900 text-gray-400 text-center py-4 text-sm">
    © 2026 Nomad Network • Travel Smart • Stay Safe
</footer>

</body>
</html>
