<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: radial-gradient(circle, #1e3c4a 0%, #0f1a1f 100%);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #333;
        }
        .login-card {
            background: #f8f9fa;
            padding: 2.5rem;
            border-radius: 12px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
            text-align: center;
        }
        .brand-name {
            color: #2c4f5e;
            font-weight: 700;
            margin-bottom: 0;
        }
        .tagline {
            font-size: 0.75rem;
            color: #666;
            margin-bottom: 1.5rem;
        }
        .btn-nomad {
            background-color: #2c4f5e;
            color: white;
            border: none;
        }
        .btn-nomad:hover {
            background-color: #1e3c4a;
            color: white;
        }
    </style>
</head>
<body>

<div class="login-card">
    <h3 class="brand-name">🌍 NomadNetwork</h3>
    <p class="tagline">Connect. Travel. Work Anywhere.</p>

    <div th:if="${message}" class="alert alert-info py-2 small" role="alert">
        <span th:text="${message}"></span>
    </div>

    <form th:action="@{/forgot-password}" method="post">
        <div class="mb-3 text-start">
            <input type="email" name="email"
                   class="form-control"
                   placeholder="Email address"
                   required>
        </div>
        
        <button type="submit" class="btn btn-nomad w-100 mb-3">
            Send Reset Link
        </button>
    </form>

    <div class="small">
        <a th:href="@{/login}" class="text-decoration-none text-muted">Back to Login</a>
    </div>
</div>

</body>
</html>
