<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Invalid Link - NomadNetwork</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: radial-gradient(circle, #1e3c4a 0%, #0f1a1f 100%);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', sans-serif;
            margin: 0;
        }
        .error-card {
            background: #f8f9fa;
            padding: 3.5rem 2.5rem;
            border-radius: 12px;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.4);
            text-align: center;
        }
        .error-icon {
            font-size: 4rem;
            margin-bottom: 1.5rem;
            display: block;
        }
        .brand-name {
            color: #2c4f5e;
            font-weight: 700;
            margin-bottom: 0.5rem;
        }
        .error-msg {
            color: #6c757d;
            font-size: 0.95rem;
            margin-bottom: 2rem;
            line-height: 1.5;
        }
        .btn-nomad {
            background-color: #2c4f5e;
            color: white;
            border: none;
            padding: 0.7rem;
            width: 100%;
            transition: 0.3s ease;
        }
        .btn-nomad:hover {
            background-color: #1e3c4a;
            color: white;
        }
        .btn-outline-nomad {
            border: 2px solid #2c4f5e;
            color: #2c4f5e;
            padding: 0.6rem;
            width: 100%;
            font-weight: 600;
        }
        .btn-outline-nomad:hover {
            background-color: #f1f3f4;
            color: #1e3c4a;
        }
    </style>
</head>
<body>

<div class="error-card">
    <span class="error-icon">🕒</span>
    
    <h3 class="brand-name">NomadNetwork</h3>
    <h5 class="text-dark fw-bold mb-3">Link Expired or Invalid</h5>
    
    <p class="error-msg">
        The password reset link you clicked is no longer valid. This usually happens if the link has already been used, or if it was requested more than 10 minutes ago.
    </p>

    <div class="d-grid gap-3">
        <a th:href="@{/forgot-password}" class="btn btn-nomad">
            Request New Link
        </a>
        <a th:href="@{/login}" class="btn btn-outline-nomad">
            Back to Login
        </a>
    </div>
</div>

</body>
</html>
